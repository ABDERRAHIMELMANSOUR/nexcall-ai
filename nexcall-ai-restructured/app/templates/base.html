<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexCall AI — {% block title %}{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📞</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  {% block extra_styles %}{% endblock %}
</head>
<body>
<div class="app">

  <!-- ═══ SIDEBAR ════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <a href="/" class="brand-logo">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
        </div>
        <div>
          <div class="brand-name">Nex<em>Call</em> AI</div>
          <div class="brand-tag">Call Center Platform</div>
        </div>
      </a>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <a href="/" class="nav-link {% if active=='dashboard' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
        Dashboard
      </a>
      <a href="/calls" class="nav-link {% if active=='calls' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
        </svg>
        Appels
      </a>
      <a href="/leads" class="nav-link {% if active=='leads' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        Leads
      </a>
      <a href="/campaigns" class="nav-link {% if active=='campaigns' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
        Campagnes
      </a>

      <div class="nav-section-label">Système</div>
      <a href="/configuration" class="nav-link {% if active=='configuration' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        Configuration
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="system-status">
        <div class="status-pulse" id="sb-dot"></div>
        <span id="sb-status">Système actif</span>
      </div>
      <div style="font-size:10px;color:rgba(255,255,255,.2);font-family:var(--font-mono);margin-top:6px">v2.0.0</div>
    </div>
  </aside>

  <!-- ═══ MAIN ═══════════════════════════════════════════ -->
  <div class="main-wrap">
    {% block content %}{% endblock %}
  </div>
</div>

<!-- Toast container -->
<div id="toast-area"></div>

<!-- ═══ GLOBAL JAVASCRIPT ════════════════════════════════ -->
<script>
/* ─── Toast ──────────────────────────────────────────── */
function toast(msg, type = 'brand', duration = 3500) {
  const area = document.getElementById('toast-area');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  area.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

/* ─── API helper ─────────────────────────────────────── */
async function api(url, opts = {}) {
  const defaults = { headers: { 'Content-Type': 'application/json', ...opts.headers } };
  const res = await fetch(url, { ...defaults, ...opts });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const msg = data.detail || data.message || `HTTP ${res.status}`;
    throw new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
  }
  return data;
}

/* ─── Formatters ─────────────────────────────────────── */
function fDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' })
    + ' ' + d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}

function fDur(secs) {
  if (!secs) return '0s';
  const m = Math.floor(secs / 60), s = secs % 60;
  return m > 0 ? `${m}m ${String(s).padStart(2,'0')}s` : `${s}s`;
}

function fScore(score) {
  const s = Math.round(score || 0);
  const color = s >= 80 ? 'var(--red)' : s >= 60 ? 'var(--amber)' : s >= 30 ? 'var(--brand)' : 'var(--text-muted)';
  return `<div class="score-wrap">
    <div class="score-track"><div class="score-fill" style="width:${s}%;background:${color}"></div></div>
    <span class="score-num" style="color:${color}">${s}</span>
  </div>`;
}

function badgeStatus(s) {
  const map = {
    incoming:    ['badge-blue',    '↙ Entrant'],
    ringing:     ['badge-blue',    '↙ Sonne'],
    answered:    ['badge-brand',   '✓ Répondu'],
    in_progress: ['badge-brand',   '⟳ En cours'],
    completed:   ['badge-emerald', '✓ Terminé'],
    transferred: ['badge-purple',  '↗ Transféré'],
    missed:      ['badge-amber',   '⚠ Manqué'],
    failed:      ['badge-red',     '✕ Échoué'],
    voicemail:   ['badge-gray',    '✉ Messagerie'],
  };
  const [cls, lbl] = map[s] || ['badge-gray', s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function badgeLead(s) {
  const map = {
    hot:       ['badge-red',     '🔥 Chaud'],
    warm:      ['badge-amber',   '◈ Tiède'],
    qualified: ['badge-brand',   '✓ Qualifié'],
    new:       ['badge-blue',    '✦ Nouveau'],
    cold:      ['badge-gray',    '❄ Froid'],
    converted: ['badge-purple',  '★ Converti'],
    contacted: ['badge-blue',    '◎ Contacté'],
    lost:      ['badge-gray',    '✕ Perdu'],
  };
  const [cls, lbl] = map[s] || ['badge-gray', s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function badgeCampaign(s) {
  const map = {
    draft:     ['badge-gray',    '✎ Brouillon'],
    active:    ['badge-brand',   '▶ Active'],
    paused:    ['badge-amber',   '⏸ Pausée'],
    completed: ['badge-purple',  '✓ Terminée'],
    archived:  ['badge-gray',    '⟲ Archivée'],
  };
  const [cls, lbl] = map[s] || ['badge-gray', s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

/* ─── Sidebar status ─────────────────────────────────── */
async function updateSidebarStatus() {
  try {
    const status = await api('/api/config/status');
    const dot = document.getElementById('sb-dot');
    const lbl = document.getElementById('sb-status');
    if (status.ringover.connected && status.openai.configured) {
      dot.style.background = 'var(--brand)';
      lbl.textContent = 'Opérationnel';
    } else {
      dot.style.background = '#f59e0b';
      lbl.textContent = 'Config. requise';
    }
  } catch {}
}
updateSidebarStatus();
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
